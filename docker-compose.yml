services:
  postgres:
    image: postgres:16-alpine
    container_name: coderoaster_postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: coderoaster
      POSTGRES_PASSWORD: coderoaster
      POSTGRES_DB: coderoaster
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
